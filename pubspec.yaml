name: gym_tracker
description: "Gym tracking app to ensure best workout quality."
publish_to: "none"
version: 1.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.3
  hive_ce: ^2.0.0
  table_calendar: ^3.2.0
  flutter_native_splash: ^2.4.8
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/exercises_init.json
    - assets/images/

  fonts:
    - family: Iner
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
